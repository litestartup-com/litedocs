<!DOCTYPE html>
<html lang="{{ locale }}" class="scroll-smooth">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found - {{ config.site.title }}</title>
  <meta name="robots" content="noindex, nofollow">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { colors: { primary: { 500: '{{ config.theme.primary_color }}' } } } }
    }
  </script>
  <link rel="stylesheet" href="{{ base_path | default('') }}/_themes/default/css/style.css">
</head>

<body class="bg-white dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 antialiased">
  <div class="min-h-screen flex items-center justify-center px-4">
    <div class="text-center max-w-md">
      <p class="text-7xl font-bold text-zinc-200 dark:text-zinc-800 mb-4">404</p>
      <h1 class="text-2xl font-semibold mb-2">Page Not Found</h1>
      <p class="text-zinc-500 dark:text-zinc-400 mb-8">
        The page <code class="text-sm bg-zinc-100 dark:bg-zinc-800 px-1.5 py-0.5 rounded">{{ current_path }}</code>
        could not be found.
      </p>
      <div class="flex items-center justify-center gap-3">
        <a href="{{ base_path | default('') }}/{{ doc_slug }}/{{ locale }}/"
          class="inline-flex items-center gap-2 px-4 py-2 text-sm font-medium text-white bg-primary-500 rounded-lg hover:opacity-90 transition-opacity">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
          </svg>
          Go Home
        </a>
      </div>
    </div>
  </div>
  <script src="{{ base_path | default('') }}/_themes/default/js/app.js"></script>
</body>

</html>
