<aside class="hidden xl:block w-[200px] shrink-0 sticky top-[6.5rem] h-[calc(100vh-6.5rem)] overflow-y-auto overscroll-contain">
  <nav class="p-4 text-[13px]" aria-label="Table of contents">
    <h4 class="font-semibold text-[11px] uppercase tracking-wider text-zinc-900 dark:text-zinc-100 mb-3">On this page</h4>
    <ul class="space-y-0.5" id="toc-list">
      {% for heading in page.toc %}
      <li>
        <a
          href="#{{ heading.id }}"
          data-toc-id="{{ heading.id }}"
          class="block py-1 text-zinc-500 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-zinc-100 transition-colors
            {% if heading.level == 3 %}pl-3{% elif heading.level == 4 %}pl-6{% endif %}"
        >
          {{ heading.text }}
        </a>
      </li>
      {% endfor %}
    </ul>
  </nav>
</aside>
